<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Login - PTL Best Tinapa</title>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
	<style>
		:root {
			--amber: #ff8c00;
			--orange: #f97316;
			--brown: #4c2a1a;
			--cream: #fff7ed;
		}

		* {
			box-sizing: border-box;
		}

		body {
			font-family: 'Poppins', sans-serif;
			background:
				radial-gradient(circle at 10% 20%, rgba(255, 189, 89, 0.28), transparent 42%),
				radial-gradient(circle at 85% 18%, rgba(255, 140, 0, 0.22), transparent 44%),
				linear-gradient(135deg, #2a1a13 0%, #5a3320 52%, #8b5e3c 100%);
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			margin: 0;
			overflow: hidden;
			padding: 1.25rem;
			color: #1f2937;
		}

		body::before,
		body::after {
			content: '';
			position: fixed;
			border-radius: 50%;
			pointer-events: none;
			filter: blur(16px);
		}

		body::before {
			width: 380px;
			height: 380px;
			top: -110px;
			left: -100px;
			background: rgba(255, 173, 84, 0.26);
			animation: floatSmoke 8s ease-in-out infinite alternate;
		}

		body::after {
			width: 320px;
			height: 320px;
			right: -85px;
			bottom: -95px;
			background: rgba(255, 208, 165, 0.2);
			animation: floatSmoke 10s ease-in-out infinite alternate-reverse;
		}

		.login-box {
			position: relative;
			width: min(92vw, 430px);
			padding: 2.2rem 2rem;
			border-radius: 22px;
			border: 1px solid rgba(255, 255, 255, 0.38);
			background: linear-gradient(140deg, rgba(255, 255, 255, 0.86), rgba(255, 247, 237, 0.72));
			backdrop-filter: blur(12px);
			box-shadow: 0 20px 45px rgba(20, 10, 6, 0.28);
			animation: cardIn 0.75s ease-out;
		}

		.brand-kicker {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.38rem 0.78rem;
			border-radius: 999px;
			font-size: 0.74rem;
			font-weight: 700;
			letter-spacing: 0.06em;
			text-transform: uppercase;
			color: var(--brown);
			background: rgba(255, 255, 255, 0.66);
			border: 1px solid rgba(255, 140, 0, 0.35);
		}

		.login-box h2 {
			font-family: 'Sora', sans-serif;
			margin: 0.9rem 0 0.35rem;
			font-size: 1.7rem;
			line-height: 1.2;
			color: #2f1f16;
		}

		.login-subtitle {
			margin: 0 0 1.4rem;
			color: #6b4a38;
			font-size: 0.95rem;
		}

		.login-box label {
			display: block;
			margin: 0.9rem 0 0.4rem;
			font-weight: 600;
			font-size: 0.9rem;
			color: #4c2a1a;
		}

		.login-box input {
			width: 100%;
			padding: 0.78rem 0.88rem;
			border: 1.6px solid #e9d5c4;
			border-radius: 11px;
			font-family: inherit;
			font-size: 0.98rem;
			background: rgba(255, 255, 255, 0.78);
			transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
		}

		.login-box input:focus {
			outline: none;
			border-color: var(--amber);
			box-shadow: 0 0 0 4px rgba(255, 140, 0, 0.18);
			transform: translateY(-1px);
		}

		.login-box button {
			margin-top: 1.25rem;
			width: 100%;
			padding: 0.85rem;
			background: linear-gradient(135deg, var(--amber) 0%, var(--orange) 60%, #d76715 100%);
			color: #fff;
			border: none;
			border-radius: 11px;
			font-weight: 700;
			font-size: 0.98rem;
			cursor: pointer;
			box-shadow: 0 12px 24px rgba(249, 115, 22, 0.34);
			transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
		}

		.login-box button:hover {
			transform: translateY(-2px);
			box-shadow: 0 16px 30px rgba(249, 115, 22, 0.42);
			filter: brightness(1.03);
		}

		.login-box button:disabled {
			opacity: 0.8;
			cursor: not-allowed;
		}

		.login-box .error {
			color: #be123c;
			margin-top: 0.95rem;
			text-align: center;
			font-size: 0.92rem;
			font-weight: 600;
			min-height: 1.2rem;
		}

		@keyframes cardIn {
			from {
				opacity: 0;
				transform: translateY(20px) scale(0.98);
			}
			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		@keyframes floatSmoke {
			0% {
				transform: translateY(0) scale(1);
			}
			100% {
				transform: translateY(16px) scale(1.06);
			}
		}

		@media (max-width: 480px) {
			.login-box {
				padding: 1.8rem 1.2rem;
				border-radius: 18px;
			}

			.login-box h2 {
				font-size: 1.45rem;
			}
		}
	</style>
</head>
<body>
	<form class="login-box" id="admin-login-form" autocomplete="off">
		<span class="brand-kicker">PTL Best Tinapa</span>
		<h2>Admin Login</h2>
		<p class="login-subtitle">Sign in to manage products and inventory.</p>
		<label for="username">Username</label>
		<input type="text" id="username" required autofocus>
		<label for="password">Password</label>
		<input type="password" id="password" required>
		<button type="submit" id="login-btn">Login</button>
		<div class="error" id="login-error" style="display:none;"></div>
	</form>
	<script>
		document.getElementById('admin-login-form').addEventListener('submit', function(e) {
			e.preventDefault();
			const user = document.getElementById('username').value.trim();
			const pass = document.getElementById('password').value;
			const button = document.getElementById('login-btn');
			const error = document.getElementById('login-error');
			error.style.display = 'none';
			button.disabled = true;
			button.textContent = 'Signing in...';

			setTimeout(function () {
			if (user === 'admin' && pass === 'admin123') {
				localStorage.setItem('admin_logged_in', '1');
				window.location.href = 'admin-dashboard.html';
			} else {
				error.textContent = 'Invalid username or password.';
				error.style.display = 'block';
				button.disabled = false;
				button.textContent = 'Login';
			}
			}, 350);
		});
	</script>
</body>
</html>
