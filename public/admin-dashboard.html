<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - PTL Best Tinapa</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/modern-style.css">
  <link rel="stylesheet" href="css/admin-dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="admin-dashboard">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <h2><i class="fas fa-fish"></i> Tinapa Admin</h2>
        <p>Dashboard</p>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-section="products"><i class="fas fa-boxes"></i> Products</a>
        <a href="#" class="nav-item" data-section="orders"><i class="fas fa-shopping-cart"></i> Orders</a>
        <a href="#" class="nav-item" data-section="customers"><i class="fas fa-users"></i> Customers</a>
        <a href="#" class="nav-item" data-section="analytics"><i class="fas fa-chart-line"></i> Analytics</a>
        <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>
    <button class="toggle-sidebar"><i class="fas fa-bars"></i></button>
    <main class="admin-main">
      <header class="admin-header">
        <div>
          <h1 class="admin-title">Product Management</h1>
          <p>Manage your store products efficiently</p>
        </div>
        <button id="add-product-btn" class="add-product-btn">
          <i class="fas fa-plus"></i> Add Product
        </button>
      </header>
      <div class="controls">
        <input type="text" id="search-input" class="search-input" placeholder="Search products...">
        <select id="filter-select" class="filter-select">
          <option value="">All Categories</option>
          <option value="fish">Fish</option>
          <option value="meat">Meat</option>
        </select>
      </div>
      <div class="products-table">
        <div class="table-header">
          <div>Image</div>
          <div>Product Name</div>
          <div>Price</div>
          <div>Description</div>
          <div>Status</div>
          <div>Actions</div>
        </div>
        <div class="table-body" id="table-body">
          <!-- Dynamic content -->
        </div>
      </div>
      <div class="pagination" id="pagination">
        <!-- Dynamic pagination -->
      </div>
      <div id="admin-message" class="message"></div>
    </main>
  </div>
  <div id="product-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Add New Product</h2>
        <button class="close-modal" onclick="closeModal()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="add-product-form">
        <div class="modal-body">
          <input type="text" id="prod-name" placeholder="Product Name *" required>
          <input type="text" id="prod-price" placeholder="Price (e.g. ₱250/kg) *" required>
          <input type="file" id="prod-image" accept="image/*">
          <textarea id="prod-desc" placeholder="Product Description *" required></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-btn secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="modal-btn primary" id="add-product-btn">Add Product</button>
        </div>
      </form>
    </div>
  </div>
  <script src="js/admin-dashboard.js"></script>
</body>
</html>
