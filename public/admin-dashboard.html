<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6fb; margin: 0; }
    .dashboard-box { max-width: 400px; margin: 8vh auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 16px #0001; padding: 2.5rem 2rem; text-align: center; }
    .dashboard-box h1 { margin-top: 0; }
    .dashboard-box button { margin-top: 2rem; padding: 0.7rem 2rem; background: #e11d48; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="dashboard-box">
    <h1>Welcome, Admin!</h1>
    <p>This is your dashboard. (Add features here.)</p>
    <button id="logout-btn">Logout</button>
  </div>
  <script>
    if (localStorage.getItem('admin_logged_in') !== '1') {
      window.location.href = 'admin-login.html';
    }
    document.getElementById('logout-btn').onclick = function() {
      localStorage.removeItem('admin_logged_in');
      window.location.href = 'admin-login.html';
    };
  </script>
</body>
</html>

            <input type="text" id="add-home-prod-price" placeholder="Price *" required>
            <input type="text" id="add-home-prod-image" placeholder="Image URL or path *" required>
            <textarea id="add-home-prod-desc" placeholder="Product Description *" required></textarea>

          <div class="modal-actions">
            <button type="button" class="modal-btn secondary" onclick="document.getElementById('add-home-prod-modal').style.display='none';">Cancel</button>
            <button type="submit" class="modal-btn primary">Add Product</button>
          </div>
        </form>
      </div>
    </div>
    <!-- Dashboard Overview -->
    <section class="dashboard-overview">
      <div class="dashboard-cards">
        <div class="dashboard-card">
          <div class="card-title">Total Products</div>
          <div class="card-value" id="stat-total-products">0</div>
        </div>
        <div class="dashboard-card">
          <div class="card-title">Total Stock</div>
          <div class="card-value" id="stat-total-stock">0</div>
        </div>
        <div class="dashboard-card">
          <div class="card-title">Low Stock</div>
          <div class="card-value" id="stat-low-stock">0</div>
        </div>
      </div>
    </section>
  </div>
  <div id="product-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Add New Product</h2>
        <button class="close-modal" onclick="closeModal()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="add-product-form" enctype="multipart/form-data">
        <div class="modal-body">
          <input type="text" id="prod-name" name="name" placeholder="Product Name *" required>
          <input type="text" id="prod-price" name="price" placeholder="Price (e.g. ₱250/kg) *" required>
          <input type="file" id="prod-image" name="image" accept="image/*">
          <textarea id="prod-desc" name="description" placeholder="Product Description *" required></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="modal-btn secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="modal-btn primary" id="add-product-btn">Add Product</button>
        </div>
      </form>
    </div>
  </div>
  <script src="js/admin-home-products.js"></script>
  <script src="js/admin-dashboard.js"></script>
</body>
</html>
