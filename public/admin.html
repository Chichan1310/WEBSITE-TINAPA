<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="css/admin-login.css">
</head>
<body>
  <div class="login-container">
    <form class="login-card" autocomplete="on">
      <h2>Admin Login</h2>
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="username">
      </div>
      <div class="input-group password-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" required autocomplete="current-password">
          <button type="button" class="toggle-password" aria-label="Show password" tabindex="-1">
            <span class="eye"></span>
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn">Login</button>
      <button type="button" class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>
    </form>
  </div>
  <script src="js/admin-login.js"></script>
</body>
</html>
